<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>櫻坂46 — 推し活カレンダー</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── SPLASH ── */
#splash {
  position: fixed; inset: 0;
  background: linear-gradient(165deg, #fdf0f5 0%, #f9dde8 40%, #f0c8d8 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#splash.fade-out {
  opacity: 0;
  transform: scale(1.04);
  pointer-events: none;
}

/* Big falling petals on splash */
.splash-petals {
  position: absolute; inset: 0;
  pointer-events: none;
  overflow: hidden;
}

/* Splash content */
.splash-crest {
  font-size: 64px;
  margin-bottom: 8px;
  animation: floatCrest 3s ease-in-out infinite;
  filter: drop-shadow(0 8px 24px rgba(200,80,130,0.25));
}
@keyframes floatCrest {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}

.splash-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 52px;
  font-weight: 800;
  color: var(--ume);
  letter-spacing: 0.15em;
  text-align: center;
  line-height: 1.1;
  margin-bottom: 6px;
  text-shadow: 0 2px 20px rgba(139,34,82,0.15);
  animation: titleReveal 1s cubic-bezier(0.34,1.2,0.64,1) 0.3s both;
}
@keyframes titleReveal {
  from { opacity:0; transform: translateY(20px) scale(0.95); }
  to   { opacity:1; transform: translateY(0)    scale(1); }
}

.splash-subtitle {
  font-family: 'Noto Serif JP', serif;
  font-size: 12px;
  color: var(--sakura-4);
  letter-spacing: 0.35em;
  margin-bottom: 4px;
  animation: titleReveal 1s cubic-bezier(0.34,1.2,0.64,1) 0.5s both;
}

.splash-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 0 24px;
  animation: titleReveal 1s ease 0.65s both;
}
.splash-divider::before,
.splash-divider::after {
  content: '';
  width: 60px; height: 1px;
  background: var(--sakura-3);
}
.splash-divider-mark {
  font-size: 14px;
  color: var(--sakura-3);
  letter-spacing: 4px;
}

.splash-start-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 18px 48px;
  background: var(--ume);
  color: white;
  border: none;
  border-radius: 50px;
  font-family: 'Shippori Mincho', serif;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 0.2em;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(139,34,82,0.35);
  transition: transform 0.18s, box-shadow 0.18s;
  animation: titleReveal 1s cubic-bezier(0.34,1.56,0.64,1) 0.85s both;
  position: relative;
  overflow: hidden;
}
.splash-start-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  border-radius: inherit;
}
.splash-start-btn:active {
  transform: scale(0.95);
  box-shadow: 0 4px 16px rgba(139,34,82,0.25);
}

.splash-ver {
  position: absolute;
  bottom: 24px;
  font-family: 'Noto Serif JP', serif;
  font-size: 10px;
  color: var(--sakura-3);
  letter-spacing: 0.2em;
  animation: titleReveal 1s ease 1.1s both;
}

/* ── MAIN CONTENT (hidden until splash done) ── */
#main {
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
}
#main.visible {
  opacity: 1;
  pointer-events: auto;
}

/* ── HOME PAGE SPECIFIC ── */
.home-hero {
  margin: 24px 18px 20px;
  border-radius: 28px;
  padding: 32px 24px;
  background: linear-gradient(145deg, var(--ume) 0%, #c45070 60%, #e07898 100%);
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 36px rgba(139,34,82,0.28);
}
.home-hero::before {
  content: '✿  ✿  ✿  ✿  ✿';
  position: absolute;
  bottom: 12px; left: 0; right: 0;
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 10px;
}
.home-hero-crest { font-size: 56px; margin-bottom: 10px; }
.home-hero-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 32px;
  font-weight: 800;
  color: white;
  letter-spacing: 0.12em;
  margin-bottom: 6px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.home-hero-sub {
  color: rgba(255,255,255,0.8);
  font-family: 'Noto Serif JP', serif;
  font-size: 11px;
  letter-spacing: 0.2em;
}

/* Quick access grid */
.quick-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 13px;
  margin: 0 18px 24px;
}
.quick-card {
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(10px);
  border-radius: 22px;
  border: 1.5px solid var(--sakura-2);
  padding: 22px 16px;
  text-align: center;
  text-decoration: none;
  color: var(--sumi);
  box-shadow: var(--shadow-petal);
  transition: transform 0.18s, box-shadow 0.18s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
}
.quick-card::before {
  content: '✿';
  position: absolute;
  bottom: -6px; right: -4px;
  font-size: 44px;
  color: var(--sakura-2);
  opacity: 0.55;
  pointer-events: none;
}
.quick-card:active { transform: scale(0.96); box-shadow: none; }
.quick-card-icon { font-size: 32px; }
.quick-card-label {
  font-family: 'Shippori Mincho', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--ume);
  letter-spacing: 0.08em;
}
.quick-card-sub {
  font-size: 10px;
  color: var(--sumi-light);
  letter-spacing: 0.06em;
}

/* Today's info strip */
.today-strip {
  margin: 0 18px 24px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  border: 1.5px solid var(--sakura-2);
  padding: 18px 20px;
  box-shadow: var(--shadow-petal);
}
.today-strip-label {
  font-family: 'Noto Serif JP', serif;
  font-size: 10px;
  color: var(--sakura-4);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.today-strip-date {
  font-family: 'Shippori Mincho', serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--ume);
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}
.today-strip-reki {
  font-family: 'Noto Serif JP', serif;
  font-size: 11px;
  color: var(--sumi-light);
  letter-spacing: 0.12em;
}

/* Upcoming mini list */
.upcoming-mini {
  margin: 0 18px 100px;
}
.upcoming-mini-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--ume);
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}
.upcoming-mini-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 16px;
  background: rgba(255,255,255,0.78);
  border-radius: 16px;
  border: 1.5px solid var(--sakura-2);
  margin-bottom: 9px;
  box-shadow: var(--shadow-petal);
  cursor: pointer;
  transition: transform 0.15s;
  text-decoration: none;
  color: var(--sumi);
}
.upcoming-mini-item:active { transform: scale(0.98); }
.upcoming-mini-icon { font-size: 22px; flex-shrink: 0; }
.upcoming-mini-info { flex: 1; }
.upcoming-mini-name { font-family: 'Noto Serif JP', serif; font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.upcoming-mini-date { font-size: 11px; color: var(--sumi-light); }
.upcoming-mini-badge {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 700;
  background: var(--sakura-1);
  color: var(--ume);
  border: 1px solid var(--sakura-2);
  white-space: nowrap;
  font-family: 'Noto Serif JP', serif;
}
.upcoming-mini-badge.event-badge {
  background: rgba(90,122,90,0.1);
  color: var(--matcha);
  border-color: rgba(90,122,90,0.3);
}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c45070">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
  }
</script>

</head>
<body>

<canvas id="petals-canvas"></canvas>

<!-- SPLASH SCREEN -->
<div id="splash">
  <canvas class="splash-petals" id="splashCanvas"></canvas>

  <div class="splash-crest">🌸</div>
  <div class="splash-title">櫻坂46</div>
  <div class="splash-subtitle">✿ 推し活カレンダー ✿</div>
  <div class="splash-divider">
    <span class="splash-divider-mark">✿ ✿ ✿</span>
  </div>
  <button class="splash-start-btn" onclick="startApp()">
    はじめる
  </button>
  <div class="splash-ver">Hanagoyomi · ver 1.0</div>
</div>

<!-- MAIN APP -->
<div id="main">
  <div id="app">
    <div id="headerMount"></div>
    <div class="page-content page-enter">

      <!-- HERO -->
      <div class="home-hero">
        <div class="home-hero-crest">🌸</div>
        <div class="home-hero-title">櫻坂46</div>
        <div class="home-hero-sub">✿ 推し活カレンダー ✿</div>
      </div>

      <!-- TODAY -->
      <div class="today-strip">
        <div class="today-strip-label">✿ TODAY</div>
        <div class="today-strip-date" id="todayDate"></div>
        <div class="today-strip-reki" id="todayReki"></div>
      </div>

      <!-- QUICK ACCESS -->
      <div class="section-kamon"><span class="section-kamon-text">✿ メニュー ✿</span></div>
      <div class="quick-grid">
        <a class="quick-card" href="calendar.html">
          <div class="quick-card-icon">📅</div>
          <div class="quick-card-label">櫻坂46</div>
          <div class="quick-card-sub">カレンダー</div>
        </a>
        <a class="quick-card" href="members.html">
          <div class="quick-card-icon">🌸</div>
          <div class="quick-card-label">推しメン</div>
          <div class="quick-card-sub">メンバー一覧</div>
        </a>
        <a class="quick-card" href="events.html">
          <div class="quick-card-icon">✿</div>
          <div class="quick-card-label">行事帳</div>
          <div class="quick-card-sub">イベント管理</div>
        </a>
        <a class="quick-card" href="members.html">
          <div class="quick-card-icon">💖</div>
          <div class="quick-card-label">推しメン登録</div>
          <div class="quick-card-sub">お気に入り管理</div>
        </a>
      </div>

      <!-- UPCOMING -->
      <div class="section-kamon"><span class="section-kamon-text">✿ COMING UP ✿</span></div>
      <div class="upcoming-mini" id="upcomingMini"></div>

    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="nav.js"></script>
<script src="sakura.js"></script>
<script>
// ── SPLASH ──────────────────────────
// Splash canvas big petals
(function() {
  const c = document.getElementById('splashCanvas');
  c.width  = window.innerWidth;
  c.height = window.innerHeight;
  const ctx = c.getContext('2d');
  const COLORS = ['#f9c9d9','#f0a0bc','#fce8ef','#e07898','#fdf0f5'];
  const items = Array.from({length:18}, () => ({
    x: Math.random()*c.width, y: Math.random()*c.height,
    r: 10+Math.random()*14, rot: Math.random()*Math.PI*2,
    rs: (Math.random()-.5)*.02, sp: .5+Math.random()*.8,
    dr: (Math.random()-.5)*.4, wb: Math.random()*Math.PI*2, wbs:.01+Math.random()*.015,
    col: COLORS[~~(Math.random()*COLORS.length)], op: .25+Math.random()*.4,
  }));
  function draw(p) {
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.globalAlpha=p.op; ctx.fillStyle=p.col; ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2-Math.PI/2;
      const px=Math.cos(a)*p.r,py=Math.sin(a)*p.r;
      const cx1=Math.cos(a-.5)*p.r*.6,cy1=Math.sin(a-.5)*p.r*.6;
      const cx2=Math.cos(a+.5)*p.r*.6,cy2=Math.sin(a+.5)*p.r*.6;
      if(i===0)ctx.moveTo(0,0);
      ctx.quadraticCurveTo(cx1,cy1,px,py);ctx.quadraticCurveTo(cx2,cy2,0,0);
    }
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
  let raf;
  function tick(){
    ctx.clearRect(0,0,c.width,c.height);
    items.forEach(p=>{
      p.wb+=p.wbs; p.x+=p.dr+Math.sin(p.wb)*.5; p.y+=p.sp; p.rot+=p.rs;
      if(p.y>c.height+20){p.y=-20;p.x=Math.random()*c.width;}
      draw(p);
    });
    raf=requestAnimationFrame(tick);
  }
  tick();
  window._stopSplashPetals = ()=>cancelAnimationFrame(raf);
})();

function startApp() {
  if(window._stopSplashPetals) window._stopSplashPetals();
  const splash = document.getElementById('splash');
  const main   = document.getElementById('main');
  splash.classList.add('fade-out');
  setTimeout(() => {
    splash.style.display = 'none';
    main.classList.add('visible');
  }, 750);
}

// ── HEADER ──────────────────────────
document.getElementById('headerMount').outerHTML = headerHTML('櫻坂46','✿ 推し活カレンダー ✿');
injectNav('index.html');

// ── TODAY ──────────────────────────
(function() {
  const now = new Date();
  const DOW = ['日','月','火','水','木','金','土'];
  const dateStr = `${now.getFullYear()}年 ${now.getMonth()+1}月${now.getDate()}日（${DOW[now.getDay()]}）`;
  document.getElementById('todayDate').textContent = dateStr;
  document.getElementById('todayReki').textContent = `${MONTHS_JP[now.getMonth()]} ✿ ${MONTHS_EN[now.getMonth()]}`;
})();

// ── UPCOMING ──────────────────────
(function() {
  const today = new Date(); today.setHours(0,0,0,0);
  const items = [];

  ACTIVE_MEMBERS.forEach(m => {
    const diff = daysUntilBirthday(m.birthday);
    if (diff <= 30) {
      const [mm,dd] = m.birthday.split('-').map(Number);
      items.push({ icon:m.avatar, name:`${m.name}の誕生日`, dateStr:`${mm}月${dd}日`, diff, href:`member-detail.html?id=${m.id}`, type:'bday' });
    }
  });

  loadEvents().forEach(e => {
    const d = new Date(e.date+'T00:00:00');
    const diff = Math.round((d - today)/86400000);
    if (diff >= 0 && diff <= 30) {
      items.push({ icon:e.emoji, name:e.name, dateStr:`${d.getMonth()+1}月${d.getDate()}日`, diff, href:'events.html', type:'event' });
    }
  });

  items.sort((a,b)=>a.diff-b.diff);
  const el = document.getElementById('upcomingMini');

  if (!items.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">✿</div><div class="empty-state-text">近日の行事はありません</div></div>`;
    return;
  }

  el.innerHTML = items.slice(0,5).map(u => {
    const diffStr = u.diff===0?'今日':u.diff===1?'明日':`あと${u.diff}日`;
    const isImg = u.icon && /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(u.icon);
    const iconHTML = isImg
      ? `<img src="${u.icon}" alt="" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid var(--sakura-2);">`
      : `<span style="font-size:22px">${u.icon}</span>`;
    return `<a class="upcoming-mini-item" href="${u.href}">
      <div class="upcoming-mini-icon">${iconHTML}</div>
      <div class="upcoming-mini-info">
        <div class="upcoming-mini-name">${u.name}</div>
        <div class="upcoming-mini-date">${u.dateStr}</div>
      </div>
      <span class="upcoming-mini-badge ${u.type==='event'?'event-badge':''}">${diffStr}</span>
    </a>`;
  }).join('');
})();
</script>
</body>
</html>
